[package]
name = "aditya29-22/edu-id-saas"
version = "0.1.0"
description = "EDU-ID SaaS Laravel Application"
license = "MIT"

[[module]]
name = "php"
source = "php/php:8.2"

[[command]]
name = "serve"
module = "php"
runner = "https://github.com/wasmerio/php-cgi-runner"

[fs]
"/public" = "public"
"/storage" = "storage"
"/config" = "config"
"/bootstrap" = "bootstrap"
"/vendor" = "vendor"
"/app" = "app"
"/database" = "database"
"/resources" = "resources"
"/routes" = "routes"

[env]
APP_NAME = "EDU-ID-SaaS"
APP_ENV = "production"
APP_KEY = "base64:/ez2MUfcLr9S/RWj+i5qFxMFsM8a+WhpHe83faQOars="
APP_DEBUG = "false"
APP_URL = "https://your-app.wasmer.app"
DB_CONNECTION = "mysql"
# IMPORTANT: You must provide a real external database host here.
# Wasmer cannot run local MySQL internally.
DB_HOST = "YOUR_EXTERNAL_DB_HOST"
DB_PORT = "3306"
DB_DATABASE = "your_db_name"
DB_USERNAME = "your_username"
DB_PASSWORD = "your_password"
