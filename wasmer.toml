[package]
name = "aditya29-22/edu-id-saas"
version = "0.1.0"
description = "EDU-ID SaaS Laravel Application"
license = "MIT"

[[module]]
name = "php"
source = "php/php:8.2"

[[command]]
name = "serve"
module = "php"
runner = "https://github.com/wasmerio/php-cgi-runner"

[fs]
"/public" = "public"
"/public/build" = "public/build"
"/storage" = "storage"
"/config" = "config"
"/bootstrap" = "bootstrap"
"/vendor" = "vendor"
"/app" = "app"
"/database" = "database"
"/resources" = "resources"
"/routes" = "routes"

[env]
APP_NAME = "EDU-ID-SaaS"
APP_ENV = "production"
APP_KEY = "base64:/ez2MUfcLr9S/RWj+i5qFxMFsM8a+WhpHe83faQOars="
APP_DEBUG = "true"
APP_URL = "https://your-app.wasmer.app"

# 1. Bypass Read-Only Filesystem Errors
VIEW_COMPILED_PATH = "/tmp"
LOG_CHANNEL = "stderr"
SESSION_DRIVER = "cookie"
CACHE_STORE = "array"

# 2. Bypass Database Connection Errors (temporary for testing)
DB_CONNECTION = "sqlite"
DB_DATABASE = ":memory:"
